# doctyp — despliegue de un único servicio (Etapa 18, PLAN-V4.md §2).
#
# Sin puerto publicado al host: el VPS corre Traefik, que descubre este contenedor por la red
# externa `proxy` (ya debe existir en el VPS -- créala una vez con `docker network create
# proxy` si aún no está, o usa el nombre real de la red de tu Traefik) y le rutea el tráfico
# por dominio hacia el puerto interno 8787. Ver DESPLIEGUE.md para el detalle completo del
# despliegue en producción y el CI/CD.

services:
  doctyp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    volumes:
      - data:/data
      - docs_data:/data/docs
      - fonts:/data/fonts:ro
    environment:
      - DOCTYP_ORGS_DIR=/data/organizations
      - DOCTYP_DB_PATH=/data/doctyp.db
      - DOCTYP_SETTINGS_PATH=/data/settings.json
      - DOCTYP_DOCS_ROOT=/data/docs
      - DOCTYP_BIND=0.0.0.0
      # Vista previa de tinymist (clic↔cursor) detrás de Traefik: `tinymist preview` rechaza
      # conexiones WebSocket cuyo Origin no esté en su lista fija de excepciones (127.0.0.1,
      # vscode-webview, Gitpod, ...) -- bindearlo a 0.0.0.0 y exponerlo tras un dominio propio
      # "no está soportado y no lo estará" (issue #2105 de Myriad-Dreamin/tinymist). Por eso el
      # data plane vuelve a escuchar solo en 127.0.0.1 (nunca alcanzable desde fuera del
      # contenedor): Traefik ya NO le habla directo (ver el router `doctyp-preview` más abajo,
      # ahora apunta al puerto 8787 de la API); `doctyp_web.py` hace de proxy interno
      # (`_proxy_preview`), reenvía a 127.0.0.1:<puerto> presentando el Origin que tinymist sí
      # acepta. DOCTYP_PREVIEW_PUBLIC_URL sigue siendo lo que se le manda al navegador (el
      # <iframe> de la vista previa) -- mismo dominio de siempre, el navegador no nota el cambio.
      - DOCTYP_PREVIEW_DATA_PORT=37800
      - DOCTYP_PREVIEW_BIND=127.0.0.1
      - DOCTYP_PREVIEW_PUBLIC_URL=https://doctyp-preview.tinorte.cl
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.doctyp.rule=Host(`doctyp.tinorte.cl`)
      - traefik.http.routers.doctyp.entrypoints=websecure
      - traefik.http.routers.doctyp.tls.certresolver=myle
      - traefik.http.routers.doctyp.service=doctyp
      - traefik.http.services.doctyp.loadbalancer.server.port=8787
      # Segundo router sobre el MISMO contenedor y el MISMO puerto 8787 (la API/doctyp_web.py) --
      # ya NO apunta directo al data plane de tinymist (37800): ese puerto ahora solo escucha en
      # 127.0.0.1, ver el comentario de DOCTYP_PREVIEW_BIND arriba. doctyp_web.py distingue este
      # tráfico por el header Host y lo proxea internamente (_proxy_preview en doctyp_web.py).
      - traefik.http.routers.doctyp-preview.rule=Host(`doctyp-preview.tinorte.cl`)
      - traefik.http.routers.doctyp-preview.entrypoints=websecure
      - traefik.http.routers.doctyp-preview.tls.certresolver=myle
      - traefik.http.routers.doctyp-preview.service=doctyp-preview
      - traefik.http.services.doctyp-preview.loadbalancer.server.port=8787

networks:
  proxy:
    external: true

volumes:
  data:
  docs_data:
  fonts:
